<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasmus+ Youth Opportunities</title>
  <meta name="description" content="Search Erasmus+ youth exchanges and training opportunities.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <div class="container hero__inner">
        <nav class="top-nav" aria-label="Main navigation">
          <a class="button button--ghost top-nav__link" href="submit.html">Add Project</a>
          <button class="button button--ghost top-nav__link" type="button" data-open-suggestions-modal>Suggestions</button>
        </nav>
      </div>
      <div class="container hero__headline">
        <div class="hero__content">
          <h1>KA15x Project Finder</h1>
          <p class="hero__subtitle">Erasmus+ Youth Opportunities</p>
        </div>
      </div>
    </header>

    <main class="container page-content">
      <section class="filters-bar" aria-label="Search and filters">
        <label class="sr-only" for="searchInput">Search projects</label>
        <div class="filter-control filter-control--search" id="searchControl">
          <input id="searchInput" type="text" placeholder="Search" autocomplete="off">
          <button class="filter-clear" id="clearSearchButton" type="button" aria-label="Clear search" hidden>×</button>
        </div>

        <label class="sr-only" for="projectTypeFilter">Project type</label>
        <div class="filter-control" id="projectTypeControl">
          <select id="projectTypeFilter">
            <option value="all">Project type</option>
            <option value="KA151 – Youth Exchange">KA151 – Youth Exchange</option>
            <option value="KA152 – Youth Exchange">KA152 – Youth Exchange</option>
            <option value="KA153 – Youth Workers Mobility">KA153 – Youth Workers Mobility</option>
          </select>
          <button class="filter-clear" id="clearProjectTypeButton" type="button" aria-label="Clear project type" hidden>×</button>
        </div>

        <label class="sr-only" for="monthFilter">Month</label>
        <div class="filter-control" id="monthControl">
          <select id="monthFilter">
            <option value="all">Month</option>
          </select>
          <button class="filter-clear" id="clearMonthButton" type="button" aria-label="Clear month" hidden>×</button>
        </div>

        <label class="sr-only" for="destinationFilter">Destination country</label>
        <div class="filter-control" id="destinationControl">
          <select id="destinationFilter">
            <option value="all">Destination</option>
          </select>
          <button class="filter-clear" id="clearDestinationButton" type="button" aria-label="Clear destination" hidden>×</button>
        </div>

        <label class="sr-only" for="residenceFilter">My country</label>
        <div class="filter-control" id="residenceControl">
          <select id="residenceFilter">
            <option value="">My country</option>
          </select>
          <button class="filter-clear" id="clearResidenceButton" type="button" aria-label="Clear country" hidden>×</button>
        </div>
      </section>

      <section class="results-section" aria-live="polite">
        <div class="results-section__header">
          <p class="results-count" id="resultsCount">Loading projects...</p>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
        <div class="empty-state" id="emptyState" hidden>
          <h2>No projects match your filters.</h2>
          <p>Try a different month, project type, destination, or search term.</p>
        </div>
      </section>
    </main>
  </div>

  <dialog class="feedback-modal" id="suggestionsModal" aria-labelledby="suggestionsModalTitle">
    <div class="feedback-modal__panel">
      <button class="feedback-modal__close" id="closeSuggestionsModalButton" type="button" aria-label="Close suggestions modal">×</button>
      <div class="feedback-modal__content">
        <h2 id="suggestionsModalTitle">Suggest improvments, give feedback, report problem</h2>
        <p class="feedback-modal__subtitle">If you want reply, leave your email.</p>

        <!-- Replace this action URL with your form service endpoint -->
        <form class="feedback-form" id="suggestionsForm" action="https://formspree.io/f/mqeyppwp" method="post">
          <input type="hidden" name="_subject" value="Platform suggestion or feedback">

          <label class="field field--stacked">
            <span>Name (optional)</span>
            <input id="suggestionsName" name="name" type="text">
          </label>

          <label class="field field--stacked">
            <span>Email (optional)</span>
            <input id="suggestionsEmail" name="email" type="email" placeholder="you@example.com">
          </label>

          <label class="field field--stacked">
            <span>Message</span>
            <textarea id="suggestionsMessage" name="message" rows="5" required></textarea>
          </label>

          <div class="form-status" id="suggestionsFormStatus" aria-live="polite"></div>

          <div class="form-actions">
            <button class="button button--primary" type="submit">Send message</button>
          </div>
        </form>
      </div>
    </div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/filters.js"></script>
  <script src="js/app.js"></script>
  <script src="js/modal.js"></script>
</body>
</html>
